task:
  name: "tabular-regression"
  description: "Tabular regression with PyTorch MLP. Uses synthetic data by default — place your own CSV at data/dataset.csv to use real data."

dataset:
  source: "data/dataset.csv"
  prepare_script: "prepare.py"

model:
  train_script: "train.py"
  editable_files: ["train.py"]
  readonly_files: ["prepare.py"]
  model_class: "tabular"

evaluation:
  metric: "val_loss"
  direction: "minimize"
  eval_command: "uv run train.py"

budget:
  time_limit_seconds: auto
  max_experiments: unlimited

platform:
  device: auto

constraints:
  no_new_dependencies: true
  no_modify_eval: true
